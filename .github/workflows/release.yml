name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}

  build:
    name: Build (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            use_cross: false
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            use_cross: true
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            use_cross: false
          - runner: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            use_cross: false
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            use_cross: false

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # zizmor: ignore[cache-poisoning]
        with:
          key: ${{ matrix.target }}
          save-if: false

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross
        env:
          CROSS_VERSION: v0.2.5
        run: |
          curl -sSfL "https://github.com/cross-rs/cross/releases/download/${CROSS_VERSION}/cross-x86_64-unknown-linux-gnu.tar.gz" \
            | sudo tar xz -C /usr/local/bin

      - name: Build (cross)
        if: matrix.use_cross
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: cross build --release --target "${TARGET}"

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "${TARGET}"

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          cd "target/${TARGET}/release"
          tar -czf "../../../portainer-stacks-${REF_NAME}-${TARGET}.tar.gz" portainer-stacks

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          cd "target/${TARGET}/release"
          7z a "../../../portainer-stacks-${REF_NAME}-${TARGET}.zip" portainer-stacks.exe

      - name: Upload binary for Docker build
        if: contains(matrix.target, 'linux-musl')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/portainer-stacks
          retention-days: 1
          if-no-files-found: error

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: portainer-stacks-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}

      - name: Upload to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: portainer-stacks-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}

  docker:
    name: Docker image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download amd64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binary-x86_64-unknown-linux-musl
          path: bin-amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binary-aarch64-unknown-linux-musl
          path: bin-arm64

      - name: Stage binaries for build context
        run: |
          mv bin-amd64/portainer-stacks portainer-stacks-amd64
          mv bin-arm64/portainer-stacks portainer-stacks-arm64
          chmod +x portainer-stacks-amd64 portainer-stacks-arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/guthman/portainer-mcp
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Attest image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ghcr.io/guthman/portainer-mcp
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true