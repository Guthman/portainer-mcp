name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - runner: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # zizmor: ignore[cache-poisoning]
        with:
          key: ${{ matrix.target }}
          save-if: false

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          cd "target/${TARGET}/release"
          tar -czf "../../../portainer-stacks-${REF_NAME}-${TARGET}.tar.gz" portainer-stacks

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          cd "target/${TARGET}/release"
          7z a "../../../portainer-stacks-${REF_NAME}-${TARGET}.zip" portainer-stacks.exe

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: portainer-stacks-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}

      - name: Upload to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: portainer-stacks-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
          prerelease: ${{ contains(github.ref_name, '-') }}
